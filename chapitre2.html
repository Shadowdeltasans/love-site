<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/chapitre2.css">
    <title>Chapitre 2</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400..900;1,400..900&display=swap" rel="stylesheet">
</head>
<body>
    <!-- Message en haut -->
    <div id="message-top">
        <p>Write what you think about yourself...</p>
        <p id="subtitle">and see what I think of you.</p>
    </div>

    <!-- Zone de saisie -->
    <input type="text" id="user-input" placeholder="Type anything...">

    <!-- Le cœur se forme ici -->
    <div id="heart-container"></div>

    <!-- Message final qui apparaît quand le coeur est complet -->
    <div id="final-message">
        I love you for everything you are.<br>
        <button onclick="window.location.href='chapitre3.html'">Continue →</button>
    </div>

    <script src="js/chapitre2.js"></script>
</body>
</html>
